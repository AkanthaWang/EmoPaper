<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Article Viewer</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github-dark.min.css">
  <style>
    :root{--bg:#0f172a;--text:#e6eef8;--muted:#9fb0c8}
    body{background:linear-gradient(180deg,#071029,#0b1220);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial;margin:0;padding:32px}
    .container{max-width:900px;margin:0 auto;background:linear-gradient(180deg,rgba(255,255,255,0.02),rgba(255,255,255,0.01));padding:28px;border-radius:12px;box-shadow:0 20px 60px rgba(2,6,23,0.6);}
    h1{color:#fff;margin-top:0}
    h2{color:var(--muted)}
    .meta{color:var(--muted);margin-bottom:18px}
    .content{background:transparent;color:var(--text);line-height:1.8}
    pre{background:#011627;padding:14px;border-radius:8px;overflow:auto}
    a{color:#7dd3fc}
    img{max-width:100%}
  </style>
</head>
<body>
  <div class="container">
    <div id="article">
      <h1>Loading…</h1>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
  <script>
    function getQuery(name) {
      const url = new URL(window.location.href);
      return url.searchParams.get(name);
    }

    async function fetchAndRender(slug) {
      if (!slug) {
        document.getElementById('article').innerHTML = '<h1>No slug provided</h1>';
        return;
      }

      // sanitize slug: allow only letters, numbers, dash and underscore
      const safe = slug.replace(/[^a-zA-Z0-9-_]/g, '');
      const path = `/blog/${safe}.md`;

      try {
        const res = await fetch(path);
        if (!res.ok) throw new Error('Not found');
        const md = await res.text();
        const html = marked.parse(md);
        document.getElementById('article').innerHTML = `<div class="content">${html}</div>`;
        document.querySelectorAll('pre code').forEach((block) => {
          hljs.highlightElement(block);
        });
      } catch (err) {
        document.getElementById('article').innerHTML = `<h1>无法加载文章</h1><p>${err.message}</p>`;
      }
    }

    const slug = getQuery('slug');
    fetchAndRender(slug);
  </script>
</body>
</html>
